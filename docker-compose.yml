services:
  # BACKEND: PocketBase
  pocketbase:
    build: .
    container_name: stagecalc_backend
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./pb_data:/pb_data

  # FRONTEND: Twoja aplikacja Next.js (zwróć uwagę na te 2 spacje przed 'frontend')
  frontend:
    image: node:20-alpine
    container_name: stagecalc_frontend
    working_dir: /app
    volumes:
      - ./app:/app
    ports:
      - "9002:9002"
    # Używamy -H 0.0.0.0 dla Next.js, aby był widoczny w sieci Proxmoxa
    command: sh -c "npm install && npm run dev -- -p 9002 -H 0.0.0.0"
    restart: unless-stopped
    depends_on:
      - pocketbase